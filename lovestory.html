<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa História</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(to bottom, #1e1e1e, #000);
      color: white;
      overflow-x: hidden;
    }

    .loading {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      flex-direction: column;
    }

    .loading span {
      color: #1db954;
      font-size: 20px;
      margin-top: 10px;
    }

    .hidden { display: none; }

    .container { padding: 20px; max-width: 500px; margin: auto; opacity: 0; transition: 1s; }
    .show { opacity: 1; }

    .header { display: flex; gap: 15px; align-items: center; }

    .cover {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      background-image: url('foto.jpg');
      background-size: cover;
      background-position: center;
    }

    h1 { margin: 0; font-size: 22px; }
    .subtitle { color: #b3b3b3; font-size: 14px; }
    .counter { margin-top: 10px; font-size: 13px; color: #1db954; }

    .play-button {
      margin-top: 25px;
      background: #1db954;
      border: none;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
    }

    .timeline { margin-top: 30px; }
    .timeline div { margin-bottom: 15px; }

    .gallery {
      margin-top: 30px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
    }

    .gallery img {
      width: 120px;
      height: 160px;
      border-radius: 10px;
      object-fit: cover;
    }

    .final {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      text-align: center;
      opacity: 0;
      transition: 1s;
    }

    .showFinal { opacity: 1; }
  </style>
</head>
<body>

<div class="loading" id="loading">
  <div>🎧</div>
  <span>Carregando nossa história...</span>
</div>

<div class="container" id="main">
  <div class="header">
    <div class="cover"></div>
    <div>
      <h1>Anderson ❤️ Amor</h1>
      <div class="subtitle">Uma história de verdade</div>
      <div class="counter" id="counter"></div>
    </div>
  </div>

  <button class="play-button" onclick="playMusic()">▶</button>

  <div class="timeline">
    <div>💑 Onde tudo começou</div>
    <div>💔 Momentos difíceis</div>
    <div>🕊️ Perdas que marcaram</div>
    <div>💪 Superação juntos</div>
    <div>❤️ Amor que permaneceu</div>
  </div>

  <div class="gallery">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
  </div>

  <div class="final" id="finalMsg">
    Se fosse preciso viver tudo de novo… eu escolheria você. ❤️
  </div>

  <audio id="music" src="sua-musica.mp3"></audio>
</div>

<script>
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('main').classList.add('show');
  }, 2500);

  function playMusic() {
    const music = document.getElementById('music');
    music.play();

    setTimeout(() => {
      document.getElementById('finalMsg').classList.add('showFinal');
    }, 10000);
  }

  function updateCounter() {
    const startDate = new Date('2016-06-01');
    const now = new Date();

    let diff = now - startDate;
    let days = Math.floor(diff / (1000 * 60 * 60 * 24));
    let years = Math.floor(days / 365);
    days %= 365;
    let months = Math.floor(days / 30);
    days %= 30;

    document.getElementById('counter').innerText =
      `${years} anos, ${months} meses e ${days} dias juntos`;
  }

  updateCounter();
  setInterval(updateCounter, 60000);
</script>

</body>
</html>
